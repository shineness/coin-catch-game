<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>接金币</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 700px;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #0c1929 0%, #1a3a5c 100%);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 20, 40, 0.95);
            border-radius: 12px;
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 2.5rem;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            margin-bottom: 10px;
        }

        .subtitle {
            color: #7ec8e3;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .score-display {
            font-size: 3rem;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            margin: 20px 0;
        }

        .final-score {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 10px;
        }

        .high-score {
            color: #4ade80;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        button {
            padding: 15px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            border: none;
            border-radius: 30px;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.6);
        }

        button:active {
            transform: scale(0.98);
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
        }

        .hud-item {
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
        }

        .hud-item.score {
            color: #ffd700;
        }

        .hud-item.lives {
            color: #ff6b6b;
        }

        #instructions {
            color: #7ec8e3;
            font-size: 0.9rem;
            margin-top: 20px;
            text-align: center;
            padding: 0 20px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="hud" class="hidden">
            <div class="hud-item score">分数: <span id="scoreValue">0</span></div>
            <div class="hud-item lives">❤️: <span id="livesValue">3</span></div>
        </div>

        <div id="startScreen">
            <h1>🪙 接金币</h1>
            <p class="subtitle">移动碗接住下落的金币！</p>
            <button id="startBtn">开始游戏</button>
            <p id="instructions">点击屏幕或拖动来移动碗</p>
        </div>

        <div id="gameOverScreen" class="hidden">
            <h1>游戏结束</h1>
            <p class="final-score">最终得分</p>
            <div class="score-display" id="finalScore">0</div>
            <p class="high-score" id="highScoreText">最高分: 0</p>
            <button id="restartBtn">再玩一次</button>
        </div>
    </div>

    <script>
        // 游戏配置
        const CONFIG = {
            coinSpeed: 3,
            coinSpeedIncrease: 0.1,
            spawnInterval: 1500,
            spawnIntervalDecrease: 50,
            minSpawnInterval: 600,
            bowlWidth: 80,
            bowlHeight: 40,
            coinRadius: 15,
            maxLives: 3
        };

        // 游戏状态
        let canvas, ctx;
        let gameLoop;
        let score = 0;
        let lives = CONFIG.maxLives;
        let highScore = localStorage.getItem('coinCatchHighScore') || 0;
        let isPlaying = false;
        let coins = [];
        let lastSpawnTime = 0;
        let currentSpawnInterval = CONFIG.spawnInterval;
        let bowlX;
        let animationId;

        // 音效上下文
        let audioCtx;

        // 初始化
        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // 移动端触摸事件
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchstart', handleTouchMove, { passive: false });
            
            // 桌面端鼠标事件
            canvas.addEventListener('mousemove', handleMouseMove);
            
            // 按钮事件
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('restartBtn').addEventListener('click', startGame);

            drawStartScreen();
        }

        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            bowlX = canvas.width / 2;
        }

        // 音效
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'catch') {
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'lose') {
                oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
        }

        // 输入处理
        function handleTouchMove(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            bowlX = touch.clientX - rect.left;
            clampBowl();
        }

        function handleMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            bowlX = e.clientX - rect.left;
            clampBowl();
        }

        function clampBowl() {
            const halfWidth = CONFIG.bowlWidth / 2;
            bowlX = Math.max(halfWidth, Math.min(canvas.width - halfWidth, bowlX));
        }

        // 游戏逻辑
        function startGame() {
            initAudio();
            
            score = 0;
            lives = CONFIG.maxLives;
            coins = [];
            currentSpawnInterval = CONFIG.spawnInterval;
            isPlaying = true;
            
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            
            updateHUD();
            
            lastSpawnTime = performance.now();
            gameLoop = requestAnimationFrame(update);
        }

        function update(timestamp) {
            if (!isPlaying) return;
            
            // 生成金币
            if (timestamp - lastSpawnTime > currentSpawnInterval) {
                spawnCoin();
                lastSpawnTime = timestamp;
                currentSpawnInterval = Math.max(
                    CONFIG.minSpawnInterval,
                    currentSpawnInterval - CONFIG.spawnIntervalDecrease
                );
            }
            
            // 更新金币位置
            updateCoins();
            
            // 绘制
            draw();
            
            // 继续游戏循环
            animationId = requestAnimationFrame(update);
        }

        function spawnCoin() {
            const coin = {
                x: Math.random() * (canvas.width - CONFIG.coinRadius * 2) + CONFIG.coinRadius,
                y: -CONFIG.coinRadius,
                speed: CONFIG.coinSpeed + Math.random() * CONFIG.coinSpeedIncrease,
                rotation: 0,
                rotationSpeed: (Math.random() - 0.5) * 0.2
            };
            coins.push(coin);
        }

        function updateCoins() {
            for (let i = coins.length - 1; i >= 0; i--) {
                const coin = coins[i];
                coin.y += coin.speed;
                coin.rotation += coin.rotationSpeed;
                
                // 检测碰撞（接住金币）
                if (checkCollision(coin)) {
                    score += 10;
                    coins.splice(i, 1);
                    playSound('catch');
                    
                    // 每100分增加金币速度
                    if (score % 100 === 0) {
                        CONFIG.coinSpeed += CONFIG.coinSpeedIncrease;
                    }
                    
                    updateHUD();
                    continue;
                }
                
                // 金币掉出屏幕
                if (coin.y > canvas.height + CONFIG.coinRadius) {
                    coins.splice(i, 1);
                    lives--;
                    playSound('lose');
                    updateHUD();
                    
                    if (lives <= 0) {
                        gameOver();
                    }
                }
            }
        }

        function checkCollision(coin) {
            const bowlTop = canvas.height - CONFIG.bowlHeight - 20;
            const bowlLeft = bowlX - CONFIG.bowlWidth / 2;
            const bowlRight = bowlX + CONFIG.bowlWidth / 2;
            
            return coin.y + CONFIG.coinRadius >= bowlTop &&
                   coin.y - CONFIG.coinRadius <= bowlTop + CONFIG.bowlHeight &&
                   coin.x >= bowlLeft &&
                   coin.x <= bowlRight;
        }

        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('coinCatchHighScore', highScore);
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('highScoreText').textContent = `最高分: ${highScore}`;
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('hud').classList.add('hidden');
            
            // 重置难度
            CONFIG.coinSpeed = 3;
        }

        function updateHUD() {
            document.getElementById('scoreValue').textContent = score;
            document.getElementById('livesValue').textContent = lives;
        }

        // 绘制
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0c1929';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制背景星星
            drawStars();
            
            // 绘制碗
            drawBowl();
            
            // 绘制金币
            drawCoins();
        }

        function drawStartScreen() {
            ctx.fillStyle = '#0c1929';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawStars();
        }

        function drawStars() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            for (let i = 0; i < 50; i++) {
                const x = (i * 73) % canvas.width;
                const y = (i * 97) % canvas.height;
                const size = (i % 3) + 1;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawBowl() {
            const bowlY = canvas.height - CONFIG.bowlHeight - 20;
            
            // 碗身
            const gradient = ctx.createLinearGradient(
                bowlX - CONFIG.bowlWidth / 2, bowlY,
                bowlX + CONFIG.bowlWidth / 2, bowlY + CONFIG.bowlHeight
            );
            gradient.addColorStop(0, '#ff6b6b');
            gradient.addColorStop(0.5, '#ee5a5a');
            gradient.addColorStop(1, '#c44');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(bowlX - CONFIG.bowlWidth / 2, bowlY);
            ctx.lineTo(bowlX + CONFIG.bowlWidth / 2, bowlY);
            ctx.lineTo(bowlX + CONFIG.bowlWidth / 3, bowlY + CONFIG.bowlHeight);
            ctx.lineTo(bowlX - CONFIG.bowlWidth / 3, bowlY + CONFIG.bowlHeight);
            ctx.closePath();
            ctx.fill();
            
            // 碗边
            ctx.strokeStyle = '#ff8';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // 高光
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.ellipse(bowlX - 10, bowlY + 5, 15, 5, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawCoins() {
            coins.forEach(coin => {
                ctx.save();
                ctx.translate(coin.x, coin.y);
                ctx.rotate(coin.rotation);
                
                // 金币外圈
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, CONFIG.coinRadius);
                gradient.addColorStop(0, '#ffd700');
                gradient.addColorStop(0.7, '#ffaa00');
                gradient.addColorStop(1, '#cc8800');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, CONFIG.coinRadius, 0, Math.PI * 2);
                ctx.fill();
                
                // 金币边框
                ctx.strokeStyle = '#996600';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 金币符号
                ctx.fillStyle = '#996600';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('¥', 0, 1);
                
                ctx.restore();
            });
        }

        // 启动游戏
        window.addEventListener('load', init);
    </script>
</body>
</html>
